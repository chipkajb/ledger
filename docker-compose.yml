services:
  ledger:
    build: .
    container_name: ledger
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ledger_data:/data
    environment:
      - DATABASE_URL=/data/ledger.db
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-in-production-32-chars-min}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@ledger.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-ledger2026}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ledger_data:
    driver: local
