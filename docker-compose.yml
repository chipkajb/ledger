services:
  ledger:
    build: .
    container_name: ledger
    restart: unless-stopped
    # Bind only to the Tailscale interface so the app is not reachable from the
    # public internet.  TAILSCALE_IP is written to .env by deploy/setup.sh.
    ports:
      - "${TAILSCALE_IP:-127.0.0.1}:3000:3000"
    volumes:
      - ledger_data:/data
    environment:
      - DATABASE_URL=/data/ledger.db
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@ledger.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ledger_data:
    driver: local
